name: Rust

on:
  push:
    branches: [rewrite]
  pull_request:
    branches: [rewrite]

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Tauri Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt
      - name: Select stable Rust
        run: rustup default stable
      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Run tests
        run: cargo test --workspace --all-features --locked
      - name: Check generated artifact freshness
        run: git diff --exit-code -- ui/src/lib/bindings.ts ui/src/lib/store/fold-fixtures.json ui/src/lib/projection/projection-fixtures.json

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Select stable Rust
        run: rustup default stable
      - name: Install dependency tools
        run: cargo install --locked --version 0.20.2 cargo-deny
      - name: Check dependency policy
        run: cargo deny check
