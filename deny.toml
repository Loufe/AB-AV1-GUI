[graph]
all-features = true

[advisories]
ignore = [
    # Transitive through ab-av1's sled-backed sample cache. These advisories
    # report maintenance status, not a known vulnerability.
    "RUSTSEC-2024-0384",
    "RUSTSEC-2025-0057",
    # gtk-rs GTK3 bindings: unmaintained, but Tauri v2 still renders through
    # GTK3 on Linux (tao/wry). Maintenance status, not a vulnerability;
    # resolved upstream when Tauri moves off GTK3.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # unic-* via urlpattern via tauri-utils; maintenance status only.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    # proc-macro-error and paste, transitive through the tauri/gtk trees;
    # maintenance status only.
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "GPL-3.0-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/Loufe/ab-av1.git"]
