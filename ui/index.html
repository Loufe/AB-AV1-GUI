<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRFty</title>
    <script>
      // No-flash theme boot: must run before first paint and stay in sync
      // with src/lib/theme.ts.
      const theme = localStorage.getItem("crfty-theme");
      if (
        theme === "dark" ||
        (theme !== "light" && matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
